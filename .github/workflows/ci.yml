name: Frontend CI

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.css'
      - '**/*.html'
      - 'package.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
