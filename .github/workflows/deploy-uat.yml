name: Deploy UAT to GitHub Pages

on:
  push:
    branches:
      - uat

# Deploy to the separate UAT Pages repo (event-management-app-uat).
permissions:
  contents: read

concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Build UAT bundle
        env:
          VITE_EMS_ENV: uat
        run: npm run build
      - name: Deploy to UAT GitHub Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.UAT_PAGES_DEPLOY_TOKEN }}
          external_repository: BobbyBaileySR/event-management-app-uat
          publish_branch: gh-pages
          publish_dir: ./dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy UAT from ${{ github.sha }}'
